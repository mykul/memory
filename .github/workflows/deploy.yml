name: Deploy to GitHub Pages

on:
  push:
    # GitHub Pages only deploys from the repo's default branch. This repo's
    # default is the claude/* branch, so deploy on pushes to either it or main.
    branches: ["main", "claude/brave-planck-3sguw7"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (build type: GitHub Actions) if it isn't already,
          # so the first deploy doesn't fail with "Get Pages site failed".
          enablement: true
      - name: Build image manifest
        # List whatever images are in images/ so the game can use them.
        # Just drop JPG/PNG/etc. into that folder — no code changes needed.
        run: |
          mkdir -p images
          python3 - <<'PY'
          import json, os
          exts = {'.jpg', '.jpeg', '.png', '.gif', '.webp', '.avif'}
          files = sorted(
              f for f in os.listdir('images')
              if os.path.splitext(f)[1].lower() in exts
          )
          with open('images/manifest.json', 'w') as fh:
              json.dump(files, fh, indent=2)
          print('Image manifest: %d file(s)' % len(files))
          PY
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The whole repo root is the static site.
          path: "."
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
