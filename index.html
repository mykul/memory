<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1226" />
  <meta name="description" content="A quick, matching game prob NSFW." />
  <title>Match! — a memory game</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234363d8'/><circle cx='50' cy='50' r='26' fill='white'/></svg>" />
</head>
<body>
  <!-- ===== Start screen ===== -->
  <section id="start" class="screen is-active" aria-labelledby="start-title">
    <div class="start-card">
      <h1 id="start-title" class="logo">Match<span>!</span></h1>
      <p class="tagline">Flip the cards. Find the pairs. Beat the clock.</p>

      <form id="start-form" autocomplete="off" novalidate>
        <label for="name" class="field-label">Your first name</label>
        <input
          id="name"
          name="name"
          type="text"
          inputmode="text"
          autocapitalize="words"
          maxlength="16"
          placeholder="e.g. Sam"
          required
          aria-required="true"
        />
        <button id="play-btn" type="submit" class="btn btn-primary">Play</button>
      </form>

      <button id="start-lb-btn" type="button" class="btn btn-ghost btn-lb">
        🏆 Leaderboard
      </button>

      <p class="hint">No sign-up. Just type a name and go.</p>
    </div>
  </section>

  <!-- ===== Game screen ===== -->
  <section id="game" class="screen" aria-labelledby="game-title">
    <h2 id="game-title" class="visually-hidden">Memory game board</h2>

    <header class="hud">
      <div class="hud-item">
        <span class="hud-label">Player</span>
        <span id="hud-name" class="hud-value">—</span>
      </div>
      <div class="hud-item hud-item--center">
        <span class="hud-label">Pairs</span>
        <span class="hud-value"><span id="hud-pairs">0</span>/<span id="hud-total">7</span></span>
      </div>
      <div class="hud-item hud-item--right">
        <span class="hud-label">Moves</span>
        <span id="hud-moves" class="hud-value">0</span>
      </div>
    </header>

    <div id="board" class="board" aria-label="Cards"></div>

    <!-- Countdown line: starts full width, shrinks to zero -->
    <div class="timer" aria-hidden="true">
      <div id="timer-bar" class="timer-bar"></div>
    </div>
  </section>

  <!-- ===== Result overlay ===== -->
  <div id="result" class="overlay" role="dialog" aria-modal="true" aria-labelledby="result-title" hidden>
    <div class="overlay-card">
      <h2 id="result-title" class="result-title">Nice!</h2>
      <p id="result-msg" class="result-msg"></p>
      <ul class="result-stats">
        <li><span class="stat-label">Time</span><span id="stat-time" class="stat-value">—</span></li>
        <li><span class="stat-label">Moves</span><span id="stat-moves" class="stat-value">—</span></li>
        <li><span class="stat-label">Your best</span><span id="stat-best" class="stat-value">—</span></li>
      </ul>

      <section class="lb-block" aria-label="Leaderboard">
        <div class="lb-head">
          <span class="lb-title">Top times</span>
          <span id="result-lb-scope" class="lb-scope"></span>
        </div>
        <ol id="result-lb-list" class="lb-list"></ol>
      </section>

      <div class="overlay-actions">
        <button id="again-btn" class="btn btn-primary" type="button">Play again</button>
        <button id="result-lb-btn" class="btn btn-ghost" type="button">🏆 Leaderboard</button>
        <button id="change-btn" class="btn btn-ghost" type="button">Change name</button>
      </div>
    </div>
  </div>

  <!-- ===== Leaderboard overlay (opened from start screen) ===== -->
  <div id="leaderboard" class="overlay" role="dialog" aria-modal="true" aria-labelledby="lb-title" hidden>
    <div class="overlay-card">
      <h2 id="lb-title" class="result-title">Leaderboard 🏆</h2>
      <p id="lb-scope" class="result-msg"></p>
      <ol id="lb-list" class="lb-list lb-list--full"></ol>
      <div class="overlay-actions">
        <button id="lb-close-btn" class="btn btn-primary" type="button">Close</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="leaderboard.js"></script>
  <script src="game.js"></script>
</body>
</html>
